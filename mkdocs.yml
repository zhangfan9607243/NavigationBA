site_name: Python Basics
site_description: Python Basics
site_url: https://zhangfan9607243.github.io/NavigationBA-PythonBasics/
repo_url: https://github.com/zhangfan9607243/NavigationBA-PythonBasics
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  ffeatures:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: blue   # 主色（导航栏背景）
      accent: blue    # 强调色（按钮、链接高亮）
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式

nav:
  - Introduction: index.md
  - Chapter 1: chapter1.md
  - Chapter 2: chapter2.md
  - Chapter 3: chapter3.md
  - Chapter 4: chapter4.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      title: Table of Contents
  - pymdownx.highlight
  - pymdownx.superfences